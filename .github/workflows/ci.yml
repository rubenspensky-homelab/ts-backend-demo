name: Node.js CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: |
            dist
            package.json
            package-lock.json
            Dockerfile

  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Show files
        run: ls -R

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/rubenspensky-homelab/ts-backend-demo:latest \
            -t ghcr.io/rubenspensky-homelab/ts-backend-demo:${{ github.sha }} \
            .
      - name: Push Docker image
        run: |
          docker push ghcr.io/rubenspensky-homelab/ts-backend-demo:latest
          docker push ghcr.io/rubenspensky-homelab/ts-backend-demo:${{ github.sha }}
