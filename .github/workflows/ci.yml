name: Node.js CI

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run project checks
        run: npm run check

  build:
    needs: quality
    runs-on: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: |
            dist
            package.json
            package-lock.json
            Dockerfile

  security-source-scan:
    needs: build
    runs-on: arc-runner-set

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Scan source, dependencies, configs and secrets with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1

  docker:
    needs: security-source-scan
    runs-on: arc-runner-set

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkit.buildkit.svc.cluster.local:1234

      - name: Compute image metadata
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

  security-image-scan:
    needs: docker
    runs-on: arc-runner-set

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ github.sha }}
          scanners: vuln,secret
          severity: MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1

  update-gitops:
    needs: security-image-scan
    runs-on: ubuntu-latest
    steps:
      - name: Update GitOps repo
        env:
          GITOPS_TOKEN: ${{ secrets.HOMELAB_APPS_PAT }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SERVICE_NAME="${GITHUB_REPOSITORY#*/}"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          git clone https://x-access-token:${GITOPS_TOKEN}@github.com/rubenspensky-homelab/homelab-apps.git
          cd homelab-apps
          sed -i "s|image: .*|image: ${IMAGE_NAME}:${IMAGE_TAG}|" \
          "infrastructure/${SERVICE_NAME}/deployment.yaml"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "infrastructure/${SERVICE_NAME}/deployment.yaml"
          git commit -m "chore: update ${SERVICE_NAME} image to ${IMAGE_TAG}"
          git push
